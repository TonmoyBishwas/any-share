name: Deploy frontend to Cloudflare Pages

# Auto-deploys the frontend to the "any-share" Cloudflare Pages project on every
# push to main. Requires two repository secrets (Settings → Secrets and variables
# → Actions): CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID.

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: frontend
        # npm install (not npm ci): the committed lockfile is missing some
        # platform-specific optional deps (@emnapi/*), which makes the strict
        # `npm ci` sync check fail on the Linux runner.
        run: npm install --no-audit --no-fund

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: frontend
          command: pages deploy dist --project-name=any-share --branch=main
